CONFIG_ZMK_KEYBOARD_NAME="AdeptBLE"

CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_GPIO=y

# CONFIG_ZMK_EXT_POWER=y

# PMW3610 Driver
CONFIG_PINCTRL=y
CONFIG_PMW3610_ALT=y
# CONFIG_PMW3610_ALT_INVERT_X=y
# CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=1000
# CONFIG_PMW3610_ALT_INIT_RETRY_COUNT=50
# CONFIG_PMW3610_ALT_INIT_RETRY_DELAY_MS=100

CONFIG_PMW3610_ALT_REST1_SAMPLE_TIME_MS=20
CONFIG_PMW3610_ALT_REST2_SAMPLE_TIME_MS=200
CONFIG_PMW3610_ALT_REST3_SAMPLE_TIME_MS=300
# Power-saving: reach the sensor's low-power rest modes sooner. Wake latency is
# the rest sample time (<=300 ms), which is the accepted "slight delay".
CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=300
CONFIG_PMW3610_ALT_REST1_DOWNSHIFT_TIME_MS=3000
CONFIG_PMW3610_ALT_REST2_DOWNSHIFT_TIME_MS=8000

CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=12
CONFIG_PMW3610_ALT_SMART_ALGORITHM=y

# Battery > sensitivity (before/after felt the same). Radio is the big drain:
#  - default 0 dBm TX instead of +8 dBm (desk-distance range is plenty)
#  - drop the experimental fast connection params -> slower interval, less radio
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=n
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=y

CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n